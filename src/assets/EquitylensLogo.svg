<svg width="150" height="150" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient defs -->
  <defs>
    <linearGradient id="fintechBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#005CFF"/>
      <stop offset="100%" stop-color="#001A4D"/>
    </linearGradient>

    <linearGradient id="fintechGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00E676"/>
      <stop offset="100%" stop-color="#00A651"/>
    </linearGradient>
  </defs>

  <!-- Outer lens -->
  <circle cx="65" cy="65" r="40" fill="white" stroke="url(#fintechBlue)" stroke-width="10"/>

  <!-- Inner lens -->
  <circle cx="65" cy="65" r="30" fill="#F5F8FF"/>

  <!-- Candlestick 1 -->
  <line x1="52" y1="50" x2="52" y2="82" stroke="url(#fintechBlue)" stroke-width="5" stroke-linecap="round"/>
  <rect x="47" y="58" width="10" height="16" rx="3" fill="url(#fintechBlue)"/>

  <!-- Candlestick 2 (center, green for profit) -->
  <line x1="65" y1="44" x2="65" y2="88" stroke="url(#fintechGreen)" stroke-width="5" stroke-linecap="round"/>
  <rect x="60" y="54" width="10" height="20" rx="3" fill="url(#fintechGreen)"/>

  <!-- Candlestick 3 -->
  <line x1="78" y1="52" x2="78" y2="80" stroke="url(#fintechBlue)" stroke-width="5" stroke-linecap="round"/>
  <rect x="73" y="60" width="10" height="14" rx="3" fill="url(#fintechBlue)"/>

  <!-- Handle -->
  <line x1="90" y1="90" x2="125" y2="125" stroke="url(#fintechBlue)" stroke-width="12" stroke-linecap="round"/>
</svg>
